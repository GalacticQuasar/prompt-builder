<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <rect width="512" height="512" rx="96" fill="#1a1a2e"/>

  <!-- Document body -->
  <rect x="116" y="60" width="240" height="320" rx="16" fill="#e2e8f0" stroke="#94a3b8" stroke-width="6"/>

  <!-- Folded corner -->
  <path d="M296 60 L356 60 L356 120 Z" fill="#94a3b8"/>
  <path d="M296 60 L296 120 L356 120 Z" fill="#cbd5e1" stroke="#94a3b8" stroke-width="4" stroke-linejoin="round"/>

  <!-- Header line (System Prompt) - bold -->
  <rect x="148" y="148" width="180" height="14" rx="7" fill="#6366f1"/>

  <!-- Text lines representing sections -->
  <rect x="148" y="184" width="140" height="10" rx="5" fill="#94a3b8"/>
  <rect x="148" y="208" width="100" height="10" rx="5" fill="#94a3b8"/>

  <!-- Second section label (Context) - bold -->
  <rect x="148" y="244" width="120" height="14" rx="7" fill="#8b5cf6"/>

  <!-- Context text lines -->
  <rect x="148" y="272" width="176" height="10" rx="5" fill="#94a3b8"/>
  <rect x="148" y="294" width="80" height="10" rx="5" fill="#94a3b8"/>

  <!-- Pencil icon (bottom right) -->
  <g transform="translate(310, 310) rotate(-45)">
    <rect x="0" y="-8" width="120" height="16" rx="3" fill="#f59e0b" stroke="#d97706" stroke-width="3"/>
    <polygon points="120,-8 120,8 140,0" fill="#fbbf24"/>
    <rect x="-6" y="-8" width="16" height="16" rx="2" fill="#92400e"/>
  </g>

  <!-- Version badge (v1) -->
  <rect x="300" y="56" width="72" height="30" rx="15" fill="#6366f1"/>
  <text x="336" y="76" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">v1</text>
</svg>